<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="widget">

    <!-- Top row: city + toggle | icon | temp -->
    <div class="top-row">
      <div class="city-block">
        <div class="city-name" id="city-name">KNOXVILLE</div>
        <div class="city-sub">WEATHER</div>
        <div class="toggle-row">
          <button class="tog active" data-city="knoxville">Knoxville</button>
          <span class="tog-sep">·</span>
          <button class="tog" data-city="mountjuliet">Mt. Juliet</button>
        </div>
      </div>

      <div class="current-icon-wrap">
        <span id="cur-icon">☀️</span>
      </div>

      <div class="current-temp-wrap">
        <div class="cur-temp" id="cur-temp">80 °F</div>
        <div class="cur-desc" id="cur-desc">clear sky</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- 7-day forecast -->
    <div class="forecast" id="forecast"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
